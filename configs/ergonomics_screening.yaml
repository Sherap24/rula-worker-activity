# Screening-level ergonomic thresholds (NOT certified ergonomic assessment).
# Angles in degrees; MediaPipe image coords (y increases downward).

min_consecutive_frames: 3
default_fps: 30.0

bending:
  # Trunk angle from vertical (degrees). Larger = more forward lean.
  trunk_flexion_deg_min: 35.0

overhead:
  # Wrist above nose by this normalized y margin (nose.y - wrist.y).
  wrist_above_nose_margin: 0.02

kneeling:
  # Knee flexion angle at knee (hip-knee-ankle); smaller = more flexed.
  knee_flexion_deg_max: 120.0
  # Hip center y must be relatively low (closer to 1.0 = lower in frame).
  hip_y_min: 0.45

squatting:
  knee_flexion_deg_max: 110.0
  hip_y_min: 0.50

awkward:
  # Count frames where trunk OR knee thresholds exceed these proxies.
  trunk_flexion_deg_min: 45.0
  knee_flexion_deg_max: 100.0

# Demo video selection for CWPV (train/validation only; never test).
cwpv_sample:
  view_id: camera_1
  # Prefer one clip per listed motion when available.
  motion_ids: ["1", "3", "4", "6", "8"]
  max_videos: 5
