# CML → taxonomy_candidate label mapping (DRAFT — CML-only provisional)
#
# NOT frozen. NOT globally approved. CWPV inspection may revise these decisions.

version: draft
status: provisional_cml_only
frozen: false
source: cml
user_confirmed: true
user_confirmed_at: "2026-06-30"
confirmation_notes: >
  Provisional CML mapping decisions reviewed and confirmed for skeleton-based
  feature extraction. Taxonomy remains NOT frozen until CWPV label inspection.
  CWPV may still revise canonical mappings and baseline class membership.

action_type_field:
  cml_label: action type
  use: metadata_only
  include_in_baseline: false
  mapping_status: excluded_from_baseline
  exclusion_reason: Values 1–4 have not been semantically verified
  verified_locally: false

# Prior ambiguous candidates retained for audit trail (superseded by decision_history)
ambiguous:
  - cml_label: hammer
    candidates: [overhead_work_reaching, bending_stooping, other]
    reason: Tool strike posture depends on work plane; only 8 construction samples
  - cml_label: picking up
    candidates: [lifting_lowering, bending_stooping]
    reason: Bending often co-occurs with pick-up in skeleton data
  - cml_label: hand catch
    candidates: [carrying, other]
    reason: Receive/catch vs transport unclear for site work
  - cml_label: pushing
    candidates: [carrying, other]
    reason: Not clearly carrying; may be excluded from carry class
  - cml_label: sitting
    candidates: [standing_idle, other]
    reason: Static seated vs idle standing taxonomy gap
  - cml_label: crawling
    candidates: [kneeling, other]
    reason: No explicit kneeling label in CML construction subset
  - cml_label: stand up
    candidates: [standing_idle, other]
    reason: Short transition vs sustained standing
  - cml_label: action type
    candidates: [filter_dimension, not_a_class]
    reason: Integer metadata; semantics unverified

decision_history:
  - cml_label: stand up
    previous_candidates: [standing_idle, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Transition into standing, not sustained standing_idle
  - cml_label: sitting
    previous_candidates: [standing_idle, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Seated posture must not be merged with standing_idle
  - cml_label: hand catch
    previous_candidates: [carrying, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Receiving/catching is not equivalent to carrying
  - cml_label: pushing
    previous_candidates: [carrying, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Pushing is a distinct material-handling action
  - cml_label: pulling
    previous_candidates: [carrying, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Pulling is a distinct material-handling action
  - cml_label: picking up
    previous_candidates: [lifting_lowering, bending_stooping]
    provisional_canonical: lifting_lowering
    include_in_baseline: true
    confidence: medium
    rationale: Primary semantic action is lifting; bending may co-occur
  - cml_label: hammer
    previous_candidates: [overhead_work_reaching, bending_stooping, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Overhead or bent posture cannot be inferred from activity name
  - cml_label: sawing
    previous_candidates: [overhead_work_reaching, bending_stooping, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Posture and working height are unknown
  - cml_label: digging
    previous_candidates: [overhead_work_reaching, bending_stooping, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Variable posture and very low sample count
  - cml_label: crawling
    previous_candidates: [kneeling, other]
    provisional_canonical: other
    include_in_baseline: false
    rationale: Crawling is not a defensible proxy for kneeling

